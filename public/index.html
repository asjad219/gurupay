<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Theme -->
  <meta name="theme-color" content="#f59e0b" />

  <!-- App Description -->
  <meta name="description" content="GuruPay - Smart Digital Payment Platform" />

  <!-- PWA Support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GuruPay" />

  <!-- Icons -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Prevent caching on browsers -->
  <meta name="description" content="GuruPay - Smart Digital Payment Platform" />

  <!-- Title -->
  <title>GuruPay</title>

</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <div id="root"></div>

  <script>
    // Force users to check for new deployments on every page load/focus
    const checkForUpdatesOnLoad = async () => {
      try {
        const response = await fetch('/version.json?t=' + Date.now(), {
          cache: 'no-store',
          headers: { 'cache-control': 'no-cache, no-store' }
        });
        const data = await response.json();
        const cachedBuildId = localStorage.getItem('gp_app_build_id');
        
        if (cachedBuildId && cachedBuildId !== data.buildId) {
          // Clear all caches and reload
          if ('caches' in window) {
            const cacheNames = await window.caches.keys();
            await Promise.all(cacheNames.map(name => window.caches.delete(name)));
          }
          // Force hard refresh
          window.location.href = window.location.href;
        } else if (!cachedBuildId) {
          localStorage.setItem('gp_app_build_id', data.buildId);
        }
      } catch (e) {
        console.warn('Failed to check for updates:', e);
      }
    };
    
    // Check on load
    checkForUpdatesOnLoad();
    
    // Check when user returns to page
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        checkForUpdatesOnLoad();
      }
    });
  </script>
</body>
</html>
